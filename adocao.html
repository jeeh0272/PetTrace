        <script>
        function toggleFavorito(botao) {
            // Procura o ícone dentro do botão
            const icone = botao.querySelector('i');
            
            // O Phosphor Icons usa a classe 'ph-fill' para pintar o ícone por dentro
            if (icone.classList.contains('ph-fill')) {
                // Se já estiver pintado, nós removemos o preenchimento e a cor ativa
                icone.classList.remove('ph-fill');
                botao.classList.remove('favoritado');
            } else {
                // Se estiver vazio, nós adicionamos o preenchimento e a cor ativa
                icone.classList.add('ph-fill');
                botao.classList.add('favoritado');
            }
        }
    </script>
